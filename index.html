<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:#000;font-family:"Press Start 2P",monospace;overflow:hidden;width:100vw;height:100vh;}
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:14px;overflow-y:auto;}
.screen.on{display:flex;}
#st{background:radial-gradient(ellipse at 50% 40%,#0d1a3a,#020508);}
#st h1{font-size:clamp(16px,6vw,38px);color:#FFD700;text-shadow:3px 3px #8B6000,0 0 40px #FFD700;letter-spacing:3px;animation:glow 1.2s infinite alternate;text-align:center;}
#st h2{font-size:clamp(7px,2.5vw,13px);color:#f55;text-align:center;}
.blink{animation:blink 1s steps(1) infinite;font-size:clamp(7px,2.2vw,11px);color:#FFD700;}
@keyframes glow{from{text-shadow:3px 3px #8B6000,0 0 20px #FFD700}to{text-shadow:3px 3px #8B6000,0 0 60px #FFD700,0 0 90px #f80}}
@keyframes blink{50%{opacity:0}}
#sc{background:linear-gradient(160deg,#06060f,#0f0605);}
#sc h2{font-size:clamp(8px,2.8vw,15px);color:#FFD700;text-align:center;}
.cgrid{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;max-width:640px;}
.ccard{width:clamp(70px,18vw,92px);border:2px solid #444;cursor:pointer;padding:5px;text-align:center;background:#080808;transition:all .2s;}
.ccard.sel{border-color:#FFD700;background:rgba(255,215,0,.12);}
.ccard canvas{display:block;margin:0 auto;}
.ccard .cn{font-size:clamp(4px,1.3vw,6.5px);color:#fff;margin-top:3px;}
.ccard .ca{font-size:clamp(3px,1vw,5px);color:#888;margin-top:1px;}
.sbtn{font-size:clamp(6px,2vw,9px);color:#555;border:2px solid #333;padding:8px 16px;cursor:pointer;background:transparent;font-family:inherit;}
.sbtn.rdy{color:#FFD700;border-color:#FFD700;}
#sh{background:linear-gradient(160deg,#060f06,#0f060f);}
#sh h2{font-size:clamp(9px,3vw,16px);color:#FFD700;text-align:center;}
.hrow{display:flex;gap:14px;}
.hbtn{width:clamp(95px,26vw,130px);height:clamp(95px,26vw,130px);border:3px solid #555;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:#111;font-size:clamp(6px,2vw,10px);color:#888;font-family:inherit;}
.hbtn.sel{border-color:#FFD700;background:rgba(255,215,0,.14);color:#FFD700;}
.hbtn .hi{font-size:clamp(24px,7vw,42px);}
#si{background:#000;}
#si h3{font-size:clamp(7px,2.4vw,12px);color:#FFD700;text-align:center;}
.elbl{font-size:clamp(4px,1.4vw,7px);color:#888;text-align:center;}
.ebig{font-size:clamp(7px,2.5vw,13px);color:#f84;text-align:center;}
.edesc{font-size:clamp(4.5px,1.6vw,7.5px);color:#ccc;text-align:center;line-height:2;max-width:340px;}
#sg{background:#000;justify-content:flex-start;padding:0;gap:0;}
#hud{width:100%;display:flex;align-items:center;justify-content:space-between;padding:4px 7px;gap:5px;background:#000;flex-shrink:0;}
.hs{flex:1;}
.hn{font-size:clamp(4px,1.5vw,7px);color:#FFD700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hpbg{height:12px;background:#180000;border:2px solid #555;}
.hpb{height:100%;background:linear-gradient(90deg,#00bb00,#55ff55);transition:width .12s;}
.hpb.lo{background:linear-gradient(90deg,#c00,#f44);}
.hpb.mi{background:linear-gradient(90deg,#b70,#fa0);}
.hsbg{height:6px;background:#000;border:1px solid #333;margin-top:2px;}
.hsb{height:100%;background:linear-gradient(90deg,#06f,#0ff);transition:width .15s;}
#tmr{font-size:clamp(13px,4vw,22px);color:#FFD700;text-shadow:0 0 12px #f80;text-align:center;min-width:32px;}
#rnd{font-size:clamp(4px,1.3vw,6px);color:#fff;text-align:center;line-height:1.7;}
#cvw{position:relative;flex:1;overflow:hidden;width:100%;}
#gc{display:block;}
#ctxt{position:absolute;top:7px;left:50%;transform:translateX(-50%);font-size:clamp(8px,2.8vw,14px);color:#FFD700;text-shadow:0 0 14px #f80;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#htxt{position:absolute;pointer-events:none;opacity:0;font-family:inherit;white-space:nowrap;text-shadow:2px 2px #000;}
#movl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
#mtxt{font-size:clamp(12px,4.5vw,26px);color:#FFD700;text-shadow:4px 4px #000,0 0 28px #f80;opacity:0;transform:scale(2);transition:all .3s;text-align:center;padding:0 10px;}
#mtxt.show{opacity:1;transform:scale(1);}

#abilpop.show{opacity:1;}
.apname{font-size:clamp(9px,3vw,15px);color:#FFD700;text-shadow:0 0 20px #f80,3px 3px #000;white-space:nowrap;}
.apdesc{font-size:clamp(4px,1.5vw,7px);color:#eee;text-shadow:1px 1px #000;margin-top:3px;}
#tc{width:100%;display:flex;justify-content:space-between;align-items:flex-end;padding:4px 7px 6px;flex-shrink:0;background:#0a0a0a;border-top:1px solid #1a1a1a;gap:5px;}
.dp{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:clamp(80px,22vw,108px);height:clamp(80px,22vw,108px);gap:2px;}
.db{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:clamp(11px,3.2vw,17px);cursor:pointer;touch-action:none;}
.db.pr{background:rgba(255,215,0,.35);border-color:#FFD700;}
.de{background:rgba(20,20,20,.4);border-radius:4px;}
.abs2{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.arow{display:flex;gap:3px;}
.ab{width:clamp(35px,9.5vw,48px);height:clamp(35px,9.5vw,48px);border-radius:50%;border:2px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;cursor:pointer;touch-action:none;position:relative;overflow:hidden;}
.ab.pr{transform:scale(.87);filter:brightness(1.6);}
.ab .ic{font-size:clamp(10px,2.8vw,14px);line-height:1;}
.ab .lb{font-size:clamp(2.5px,.75vw,4px);line-height:1;opacity:.75;}
.cdo{position:absolute;inset:0;border-radius:50%;pointer-events:none;}
.abp{background:rgba(255,50,50,.38);border-color:#f33;}
.abk{background:rgba(255,130,0,.38);border-color:#f90;}
.abs_{background:rgba(50,90,255,.38);border-color:#46f;}
.abco{background:rgba(255,195,0,.38);border-color:#fd0;}
.absu{background:rgba(165,0,255,.48);border-color:#b0f;}
.abj{background:rgba(60,255,60,.22);border-color:#4f4;}
.abq{background:rgba(0,220,255,.35);border-color:#0df;}
.abw{background:rgba(255,0,180,.38);border-color:#f0b;}
</style>

<script>
(function(){
// UTILS
function G(id){return document.getElementById(id);}
function clamp(lo,hi,v){return Math.max(lo,Math.min(hi,v));}
function show(scr){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("on");});G(scr).classList.add("on");resizeCanvas();}
function rr(ctx,x,y,w,h,r){x=Math.floor(x);y=Math.floor(y);r=Math.max(0,Math.min(r,Math.abs(w)/2,Math.abs(h)/2));ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();ctx.fill();}
function bx(ctx,x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.floor(x),Math.floor(y),Math.ceil(w),Math.ceil(h));}
function cr(ctx,x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(Math.floor(x),Math.floor(y),r,0,Math.PI*2);ctx.fill();}
function shd(hex,a){try{var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return"rgb("+clamp(0,255,r+a)+","+clamp(0,255,g+a)+","+clamp(0,255,b+a)+")";}catch(e){return hex;}}
function line(ctx,x1,y1,x2,y2,c,w){ctx.strokeStyle=c;ctx.lineWidth=w||2;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}

// CANVAS
var GW=800,GH=400,gc=G(“gc”),ctx=gc.getContext(“2d”);
gc.width=GW;gc.height=GH;
var csc=1;
function resizeCanvas(){var w=G(“cvw”);if(!w)return;var cw=w.clientWidth,ch=w.clientHeight;csc=Math.min(cw/GW,ch/GH);gc.style.width=Math.floor(GW*csc)+“px”;gc.style.height=Math.floor(GH*csc)+“px”;gc.style.display=“block”;gc.style.margin=“auto”;}
window.addEventListener(“resize”,resizeCanvas);

// PARTICLES SYSTEM
var PARTS=[];
function addPart(x,y,vx,vy,life,size,col,type){PARTS.push({x:x,y:y,vx:vx,vy:vy,life:life,maxL:life,size:size,col:col,type:type||“circle”});}
function stepParts(){for(var i=PARTS.length-1;i>=0;i–){var p=PARTS[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life–;if(p.life<=0){PARTS.splice(i,1);}}}
function drawParts(){PARTS.forEach(function(p){var al=p.life/p.maxL;ctx.globalAlpha=al;ctx.fillStyle=p.col;if(p.type===“circle”){ctx.beginPath();ctx.arc(p.x,p.y,p.size*al,0,Math.PI*2);ctx.fill();}else if(p.type===“rect”){ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);}else if(p.type===“star”){var s=p.size*al;ctx.font=s*2+“px serif”;ctx.textAlign=“center”;ctx.fillText(”*”,p.x,p.y);}ctx.globalAlpha=1;});}
function fireParticles(x,y,dir,n,col){for(var i=0;i<n;i++){addPart(x,y,dir*(2+Math.random()*4)+(Math.random()-.5)*3,(Math.random()-.5)*4-1,12+Math.random()*10,4+Math.random()*5,col);}}
function stretchEffect(fx,fy,tx,ty,col,w){ctx.strokeStyle=col;ctx.lineWidth=w||8;ctx.lineCap=“round”;ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);ctx.stroke();}

// PROJECTILES
var PROJS=[];
function addProj(x,y,vx,vy,dmg,col,size,owner,type){PROJS.push({x:x,y:y,vx:vx,vy:vy,dmg:dmg,col:col,size:size,owner:owner,type:type||“ball”,life:80});}
function stepProjs(){
for(var i=PROJS.length-1;i>=0;i–){
var p=PROJS[i];p.x+=p.vx;p.y+=p.vy;p.life–;
if(p.type!==“gravity”)p.vy+=0.05;
if(p.life<=0||p.x<0||p.x>GW||p.y>GH){PROJS.splice(i,1);continue;}
var tgt=p.owner===“p1”?p2:p1;
if(tgt&&Math.abs(p.x-tgt.x)<20+tgt.hitW&&Math.abs(p.y-(tgt.y-34))<34){
doHit(p.owner===“p1”?p1:p2,tgt,p.dmg,p.type);
for(var k=0;k<6;k++)addPart(p.x,p.y,(Math.random()-.5)*5,(Math.random()-0.7)*5,10,4,p.col);
PROJS.splice(i,1);
}
}
}
function drawProjs(){
PROJS.forEach(function(p){
ctx.fillStyle=p.col;
if(p.type===“bullet”){
ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(p.vy,p.vx));
bx(ctx,-10,-2,20,4,p.col);ctx.restore();
cr(ctx,p.x,p.y,3,”#fff”);
} else if(p.type===“fireball”){
var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
g.addColorStop(0,”#fff”);g.addColorStop(0.3,”#ff8800”);g.addColorStop(1,“rgba(255,40,0,0)”);
ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
for(var fi=0;fi<3;fi++)addPart(p.x+(Math.random()-.5)*p.size,p.y+(Math.random()-.5)*p.size,(Math.random()-.5)*1,(Math.random()-1)*2,6,3,”#ff6600”);
} else if(p.type===“thunder”){
ctx.strokeStyle=”#ffff00”;ctx.lineWidth=3;ctx.shadowColor=”#0ff”;ctx.shadowBlur=12;
ctx.beginPath();var tx=p.x,ty=p.y;ctx.moveTo(tx,ty-p.size*2);
for(var ti=0;ti<5;ti++){tx+=(Math.random()-.5)*10;ty+=p.size*.8;ctx.lineTo(tx,ty);}
ctx.stroke();ctx.shadowBlur=0;
} else if(p.type===“ice”){
ctx.fillStyle=p.col;ctx.strokeStyle=”#aaf”;ctx.lineWidth=2;
for(var ia=0;ia<6;ia++){var ang=ia/6*Math.PI*2;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+Math.cos(ang)*p.size,p.y+Math.sin(ang)*p.size);ctx.stroke();}
cr(ctx,p.x,p.y,p.size*.4,”#ddf”);
} else if(p.type===“sand”){
ctx.globalAlpha=0.7;ctx.fillStyle=p.col;ctx.beginPath();ctx.ellipse(p.x,p.y,p.size,p.size*.5,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
} else if(p.type===“string”){
ctx.strokeStyle=p.col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.x,p.y-p.size*2);ctx.lineTo(p.x,p.y+p.size*2);ctx.stroke();
} else {
var rg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
rg.addColorStop(0,”#fff”);rg.addColorStop(1,p.col);
ctx.fillStyle=rg;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
}
});
}

// CHARACTERS with DEVIL FRUIT ABILITIES
var CHARS=[
{id:“luffy”,name:“LUFFY”,sub:“Gum-Gum Fruit”,hp:120,spd:5,col:”#cc2200”,
abilities:{
punch:{name:“Gum-Gum Pistol”,desc:“Rubber fist stretches far!”,dmg:10,cd:380,rng:160},
kick:{name:“Gum-Gum Whip”,desc:“Spinning rubber leg sweep!”,dmg:14,cd:600,rng:100},
special:{name:“Gear 2nd Jet Bullet”,desc:“Superheated blood turbo punch!”,dmg:22,cd:2000,rng:200},
combo:{name:“Gum-Gum Gatling”,desc:“Rapid rubber fist barrage!”,dmg:28,cd:2800,rng:120},
q:{name:“Gear 3rd Giant Pistol”,desc:“Bone-inflated giant fist!”,dmg:36,cd:3500,rng:220},
w:{name:“Gum-Gum Elephant Gun”,desc:“Haki-coated massive blow!”,dmg:42,cd:4500,rng:240},
super:{name:“Gear 4th Boundman”,desc:“BOUNDMAN! Massive power surge!”,dmg:55,cd:0,rng:260}
},draw:drawLuffy},
{id:“zoro”,name:“ZORO”,sub:“3-Sword Style”,hp:130,spd:4,col:”#22aa33”,
abilities:{
punch:{name:“Oni Giri”,desc:“Three-sword simultaneous slash!”,dmg:12,cd:400,rng:105},
kick:{name:“Tora Gari”,desc:“Tiger Hunt crossing blades!”,dmg:15,cd:650,rng:105},
special:{name:“108 Pound Cannon”,desc:“Air pressure sword blast!”,dmg:24,cd:2100,rng:190},
combo:{name:“Santoryu: Iai”,desc:“Lightning-fast three-sword draw!”,dmg:30,cd:2800,rng:110},
q:{name:“Asura: Makyuu Senbon”,desc:“Nine-blade demon form!”,dmg:38,cd:3600,rng:130},
w:{name:“Rengoku Oni Giri”,desc:“Purgatory three-sword slash!”,dmg:44,cd:4500,rng:120},
super:{name:“Billion-Sword Dragon!”,desc:“Entire body becomes a blade!”,dmg:58,cd:0,rng:150}
},draw:drawZoro},
{id:“nami”,name:“NAMI”,sub:“Clima-Tact”,hp:100,spd:6,col:”#ff8800”,
abilities:{
punch:{name:“Thunder Bolt Tempo”,desc:“Lightning strike attack!”,dmg:9,cd:400,rng:180},
kick:{name:“Mirage Tempo”,desc:“Illusion dodge and counter!”,dmg:11,cd:700,rng:90},
special:{name:“Tornado Tempo”,desc:“Tornado barrage!”,dmg:20,cd:2000,rng:200},

// DRAW CHARACTERS - REALISTIC PROPORTIONS
// Base character is ~28px wide, 72px tall at FLOOR
// Body segments: head(14px), neck(4px), torso(22px), legs(28px)

function drawBody(ctx,x,y,torsoCol,pantsCol,skinCol,hatCol,hairCol,dir,st,fr){
var lw=st===“walk”?(fr%2?5:-4):0;
// Shadow
ctx.fillStyle=“rgba(0,0,0,0.25)”;ctx.beginPath();ctx.ellipse(x+14,y+70,17,4,0,0,Math.PI*2);ctx.fill();
// Pants/Legs
ctx.fillStyle=pantsCol;rr(ctx,x+3,y+44,11,26,3);rr(ctx,x+16,y+44+lw,11,26,3);
// Shoes
ctx.fillStyle=”#111”;
ctx.beginPath();ctx.ellipse(x+8,y+70,7,3.5,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(x+21,y+68+lw,7,3.5,0,0,Math.PI*2);ctx.fill();
// Belt line
bx(ctx,x+2,y+43,24,3,shd(torsoCol,-20));
// Torso
ctx.fillStyle=torsoCol;rr(ctx,x+1,y+21,26,24,5);
// Collar/chest details
ctx.fillStyle=shd(torsoCol,-30);rr(ctx,x+1,y+21,26,8,4);
return lw;
}

function drawHeadBase(ctx,x,y,skinCol,dir){
// Neck
ctx.fillStyle=skinCol;rr(ctx,x+10,y+15,8,7,2);
// Head
ctx.fillStyle=skinCol;ctx.beginPath();ctx.ellipse(x+14,y+8,13,12,0,0,Math.PI*2);ctx.fill();
// Ear
var ex=dir>0?x+27:x+1;
ctx.fillStyle=shd(skinCol,-15);ctx.beginPath();ctx.ellipse(ex,y+8,3,4,0,0,Math.PI*2);ctx.fill();
}

function drawEyes(ctx,x,y,eyeCol,dir,angry){
var ex1=dir>0?x+8:x+12,ex2=dir>0?x+18:x+22;
ctx.fillStyle=”#fff”;ctx.beginPath();ctx.ellipse(ex1,y+6,3.5,3.5,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(ex2,y+6,3.5,3.5,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle=eyeCol;ctx.beginPath();ctx.ellipse(ex1,y+6,2.2,2.2,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(ex2,y+6,2.2,2.2,0,0,Math.PI*2);ctx.fill();
// Pupils
cr(ctx,ex1+0.5,y+6.5,1,”#000”);cr(ctx,ex2+0.5,y+6.5,1,”#000”);
// Eye shine
cr(ctx,ex1-0.5,y+5,0.8,”#fff”);cr(ctx,ex2-0.5,y+5,0.8,”#fff”);
if(angry){ctx.fillStyle=shd(”#cc3300”,0);ctx.beginPath();ctx.moveTo(ex1-3,y+2);ctx.lineTo(ex1+3,y+4);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(ex2+3,y+2);ctx.lineTo(ex2-3,y+4);ctx.closePath();ctx.fill();}
}

function drawMouth(ctx,x,y,grin){
ctx.strokeStyle=”#552200”;ctx.lineWidth=1.8;ctx.lineCap=“round”;
ctx.beginPath();
if(grin){ctx.arc(x+14,y+12,5,0.2,Math.PI-0.2);}else{ctx.arc(x+14,y+14,3,-0.3,Math.PI+0.3);}
ctx.stroke();
}

// LUFFY - detailed rubber man
function drawLuffy(ctx,x,y,dir,st,fr,sup){
var s=Math.floor(x),fy=Math.floor(y),t=Date.now()/1000;
var lw=drawBody(ctx,s,fy,”#cc2200”,”#1a1a66”,”#f4b77a”,”#cc9900”,”#111”,dir,st,fr);
// Straw hat
ctx.fillStyle=”#e8b000”;ctx.beginPath();ctx.arc(s+14,fy-2,14,Math.PI,0,false);ctx.fill();
ctx.fillStyle=”#cc9900”;ctx.beginPath();ctx.ellipse(s+14,fy,20,5,0,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=”#885500”;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(s+14,fy,20,5,0,0,Math.PI*2);ctx.stroke();
bx(ctx,s+2,fy-3,24,4,”#cc0000”);
// Black hair
ctx.fillStyle=”#111”;ctx.beginPath();ctx.arc(s+14,fy-2,13,Math.PI,0,false);ctx.fill();
drawHeadBase(ctx,s,fy,”#f4b77a”,dir);
drawEyes(ctx,s,fy,”#111”,dir,st===“hurt”);
drawMouth(ctx,s,fy,true);
// Scar under left eye
ctx.strokeStyle=”#cc4422”;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(s+8,fy+10);ctx.lineTo(s+10,fy+15);ctx.stroke();
// Arms
var ao=st===“walk”?Math.sin(fr/2)*4:0;
if(st===“punch”||st===“special”||st===“q”||st===“w”){
// STRETCH ARM - Luffy’s rubber ability!
var strLen=st===“w”?180:st===“q”?160:st===“special”?130:110;
var armX=s+(dir>0?28:-5),armY=fy+28;
var tipX=armX+(dir>0?strLen:-strLen),tipY=fy+30;
// Rubber arm tube - multiple segments
ctx.strokeStyle=”#f4b77a”;ctx.lineWidth=10;ctx.lineCap=“round”;
ctx.beginPath();ctx.moveTo(s+(dir>0?22:6),fy+28);
ctx.bezierCurveTo(s+(dir>0?40:0)+dir*strLen*.3,fy+20,armX+dir*strLen*.6,fy+35,tipX,tipY);
ctx.stroke();
// Segment lines on rubber arm
ctx.strokeStyle=shd(”#f4b77a”,-25);ctx.lineWidth=1.5;
for(var ri=0;ri<5;ri++){var rp=ri/5;var rx=s+(dir>0?22:6)+dir*strLen*rp;ctx.beginPath();ctx.arc(rx,fy+28+Math.sin(rp*Math.PI)*5,5,dir>0?Math.PI*1.5:Math.PI*0.5,dir>0?Math.PI*0.5:Math.PI*1.5);ctx.stroke();}
// Fist at tip
ctx.fillStyle=st===“w”?”#222”:”#f4b77a”;
ctx.beginPath();ctx.ellipse(tipX,tipY,st===“w”?16:13,st===“w”?14:11,0,0,Math.PI*2);ctx.fill();
if(st===“w”){ctx.strokeStyle=“rgba(0,0,0,0.8)”;ctx.lineWidth=2;ctx.stroke();// Haki black fist
ctx.fillStyle=“rgba(0,0,0,0.4)”;ctx.beginPath();ctx.ellipse(tipX,tipY,20,18,0,0,Math.PI*2);ctx.fill();}
// Impact burst
if(st===“punch”||st===“q”||st===“w”){
ctx.fillStyle=“rgba(255,200,0,0.6)”;ctx.beginPath();ctx.ellipse(tipX,tipY,22,18,0,0,Math.PI*2);ctx.fill();
}
ctx.fillStyle=”#f4b77a”;rr(ctx,s+(dir>0?-5:20),fy+24+ao,10,17,4); // other arm
} else if(st===“combo”){
// Gatling - multiple fists
for(var gi=0;gi<3;gi++){
var gOff=gi*18;ctx.fillStyle=”#f4b77a”;
ctx.beginPath();ctx.ellipse(s+(dir>0?34+gOff:-8-gOff),fy+28+gi*4,10,9,0,0,Math.PI*2);ctx.fill();
}
ctx.fillStyle=”#f4b77a”;rr(ctx,s+(dir>0?-5:20),fy+24+ao,10,17,4);
} else {
ctx.fillStyle=”#f4b77a”;rr(ctx,s-5,fy+24+ao,10,17,4);rr(ctx,s+21,fy+24-ao,10,17,4);
}
// Gear 4 aura
if(sup||st===“super”){
for(var si=0;si<12;si++){ctx.fillStyle=“rgba(255,”+(80+si*10)+”,0,0.2)”;ctx.beginPath();ctx.ellipse(s+14,fy+30,34+si*2,40+si*2,0,0,Math.PI*2);ctx.fill();}
ctx.strokeStyle=“rgba(255,120,0,0.6)”;ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(s+14,fy+30,48,54,0,0,Math.PI*2);ctx.stroke();
// Steam from body
for(var sv=0;sv<5;sv++)addPart(s+5+sv*6,fy+20,(Math.random()-.5)*2,-3+Math.random()*-2,15,4+Math.random()*3,“rgba(200,100,0,0.5)”,“circle”);
}
}

// ZORO - three swords slashing
function drawZoro(ctx,x,y,dir,st,fr,sup){
var s=Math.floor(x),fy=Math.floor(y),t=Date.now()/1000;
var lw=drawBody(ctx,s,fy,”#228833”,”#111”,”#d4946a”,””,””,dir,st,fr);
// Bandana
bx(ctx,s+1,fy+0,26,5,”#22aa33”);
ctx.fillStyle=”#22aa33”;rr(ctx,s+20,fy-4,12,10,4);
drawHeadBase(ctx,s,fy,”#d4946a”,dir);
drawEyes(ctx,s,fy,”#5a3a1a”,dir,true);
drawMouth(ctx,s,fy,false);
// Ear ring
cr(ctx,s+(dir>0?27:1),fy+9,2.5,”#ffd700”);

var swing=st===“punch”||st===“kick”||st===“special”||st===“combo”||st===“q”||st===“w”||st===“super”;
var sa=swing?0.6:0.1;

// Three swords with proper swing arcs
function sword3(ox,oy,len,baseAng,col,guardC){
var ang=baseAng+(swing?(dir>0?-sa:sa):0);
ctx.save();ctx.translate(s+ox,fy+oy);ctx.rotate(dir>0?ang:-ang);
var g=ctx.createLinearGradient(0,-2,len,2);g.addColorStop(0,col);g.addColorStop(0.3,”#eee”);g.addColorStop(0.8,col);g.addColorStop(1,”#666”);
ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(len-6,-1.5);ctx.lineTo(len,0);ctx.lineTo(len-6,1.5);ctx.lineTo(0,3);ctx.closePath();ctx.fill();
ctx.strokeStyle=”#888”;ctx.lineWidth=0.5;ctx.stroke();
ctx.fillStyle=guardC;ctx.beginPath();ctx.ellipse(0,0,5,8,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle=”#552200”;rr(ctx,-12,-3.5,12,7,2);ctx.restore();
if(swing){// Slash arc
ctx.strokeStyle=“rgba(220,220,255,0.55)”;ctx.lineWidth=3;ctx.beginPath();
ctx.arc(s+ox,fy+oy,len*.7,dir>0?Math.PI*1.2:Math.PI*1.8,dir>0?Math.PI*1.8:Math.PI*1.2);ctx.stroke();
}
}
// Mouth sword (third sword)
var mx=dir>0?x+18:x+8;
ctx.strokeStyle=”#888”;ctx.lineWidth=3;ctx.lineCap=“round”;
ctx.beginPath();ctx.moveTo(s+14,fy+14);ctx.lineTo(s+14+(dir>0?36:-36),fy+10+(swing?-15:5));ctx.stroke();
ctx.fillStyle=”#aaa”;ctx.beginPath();ctx.ellipse(s+14,fy+14,5,6,0,0,Math.PI*2);ctx.fill();

sword3(6,28,40,dir>0?0.15:-0.15,”#ddd”,”#aaa”);
sword3(22,26,44,dir>0?-0.4:0.4,”#c44”,”#611”);

var ao=st===“walk”?Math.sin(fr/2)*4:0;
ctx.fillStyle=”#d4946a”;rr(ctx,s-5,fy+24+ao,10,17,4);rr(ctx,s+21,fy+24-ao,10,17,4);

// Asura demon form aura
if(sup||st===“super”||st===“q”){
ctx.globalAlpha=0.5;
// Extra ghostly swords
for(var ai=0;ai<3;ai++){
ctx.strokeStyle=[”#aa2222”,”#2222aa”,”#22aa22”][ai];ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(s+14+(ai-1)*20,fy-20);ctx.lineTo(s+14+(ai-1)*20+dir*60,fy+30);ctx.stroke();
}
ctx.globalAlpha=0.25;ctx.fillStyle=”#00ff00”;ctx.beginPath();ctx.ellipse(s+14,fy+30,40,46,0,0,Math.PI*2);ctx.fill();
ctx.globalAlpha=1;
}
}

var vk={left:false,right:false,up:false};

// COOLDOWNS
function onCD(m){return m!==“super”&&Date.now()<CD[m];}
function startCD(m){if(m!==“super”)CD[m]=Date.now()+getCD(m);}
function cdPct(m){if(m===“super”)return 0;var r=CD[m]-Date.now();return r>0?r/getCD(m):0;}
function updCD(){
[“punch”,“kick”,“special”,“combo”,“q”,“w”].forEach(function(m){
var btn=document.querySelector(”.ab[data-a=’”+m+”’]”);if(!btn)return;
var p=cdPct(m),ov=btn.querySelector(”.cdo”);
if(ov)ov.style.background=p>0?“conic-gradient(rgba(0,0,0,0.65) “+Math.round(p*100)+”%, transparent “+Math.round(p*100)+”%)”:“none”;
btn.style.opacity=p>0?“0.45”:“1”;
});
}

// SHOW ABILITY NAME
function showAbil(name,desc){
var pop=G(“abilpop”),an=G(“apn”),ad=G(“apd”);
if(!pop)return;
an.textContent=name;ad.textContent=desc;

// FIRE ABILITY-SPECIFIC PROJECTILE
function fireAbilProj(type,fromP,ab){
var owner=fromP===p1?“p1”:“p2”;
var dir=fromP.face;
var ox=fromP.x+(dir>0?28:0),oy=fromP.y-34;
if(type===“punch”&&pc&&pc.id===“usopp”){// Impact Wolf
addProj(ox,oy,dir*14,-1,ab.dmg,”#cc8844”,8,owner,“ball”);
}else if(type===“special”&&pc&&pc.id===“usopp”){
for(var ui=0;ui<3;ui++)addProj(ox,oy+(ui-1)*8,dir*(12+ui*2),(-1+ui*.5),ab.dmg*.6,”#cc6600”,7,owner,“ball”);
}else if(pc&&pc.id===“ace”&&(type===“punch”||type===“q”||type===“w”)){
addProj(ox,oy,dir*13,-0.5,ab.dmg,”#ff4400”,type===“w”?20:14,owner,“fireball”);
}else if(pc&&pc.id===“nami”&&(type===“punch”||type===“special”||type===“q”)){
addProj(ox,oy,dir*11,0,ab.dmg,”#ffff44”,10,owner,“thunder”);
}else if(pc&&pc.id===“franky”&&(type===“special”||type===“q”||type===“w”)){
addProj(ox,oy,dir*15,0,ab.dmg,type===“w”?”#ff4400”:”#00aaff”,12,owner,“bullet”);
}
}

// ATTACKS
function pAtk(type){
if(!p1||p1.hs>0||(p1.st===“super”&&p1.stT>10))return;
if(onCD(type)){
var btn=document.querySelector(”.ab[data-a=’”+type+”’]”);
if(btn){btn.style.borderColor=”#f00”;setTimeout(function(){btn.style.borderColor=””;},160);}return;
}
if(type!==“super”)startCD(type);
var ab=pc.abilities[type];if(!ab)return;
showAbil(ab.name,ab.desc);
var dmg=ab.dmg,rng=ab.rng;
if(type===“super”){if(p1.sp<100)return;p1.sp=0;p1.st=“super”;p1.stT=45;if(Math.abs(p1.x-p2.x)<rng)doHit(p1,p2,dmg,“super”);return;}
p1.st=type;p1.stT=type===“combo”?30:22;
fireAbilProj(type,p1,ab);
if(Math.abs(p1.x-p2.x)<rng){
doHit(p1,p2,dmg,type);p1.sp=Math.min(100,p1.sp+(type===“combo”?16:9));
}
}

function doHit(att,def,dmg,type){
// ACTUAL DAMAGE - NPC does damage too!
def.hp=Math.max(0,def.hp-dmg);
def.hs=type===“super”?40:type===“combo”?26:type===“q”||type===“w”?22:14;
def.vx=att.face*(type===“super”?11:type===“combo”?7:type===“q”?8:5);
if(type===“super”){shk=18;def.vy=-9;}else if(type===“combo”||type===“q”||type===“w”)shk=10;else shk=5;
// Hit particles
var hx=def.x+14,hy=def.y-34;
for(var pi=0;pi<8;pi++)addPart(hx+(Math.random()-.5)*20,hy+(Math.random()-.5)*20,(Math.random()-.5)*6,(Math.random()-0.6)*5,10+Math.random()*8,3+Math.random()*4,type===“super”?”#FFD700”:type===“combo”?”#ff8800”:”#fff”,“circle”);
if(!att.isAI){var now=Date.now();if(now-att.lh<700)att.combo++;else att.combo=1;att.lh=now;if(att.combo>=3)showCombo(att.combo+” HIT COMBO!”);}
var lbl={punch:“HIT!”,kick:“SMASH!”,special:“SPECIAL!”,combo:“COMBO!!”,q:“POWER!”,w:“ULTIMATE!”,super:“SUPER!!”};
var clr={punch:”#fff”,kick:”#fa0”,special:”#f60”,combo:”#ff0”,q:”#0ff”,w:”#f0f”,super:”#FFD700”};
showHT(lbl[type]||“HIT!”,def.x+14,def.y-50,clr[type]||”#fff”);
updHUD();
if(def.hp<=0)endBattle(att===p1?“player”:“enemy”);
}

// AI - now does REAL damage!
function runAI(){
if(!p2||p2.hp<=0)return;
var dist=Math.abs(p2.x-p1.x),agg=0.3+cr2*0.025,rt=Math.max(10,40-cr2);
p2.aidt–;
if(p2.aidt>0){
if(p2.aist===“approach”){p2.vx=p2.face>0?-p2.ed.spd:p2.ed.spd;p2.st=“walk”;}
else if(p2.aist===“retreat”){p2.vx=p2.face>0?p2.ed.spd:-p2.ed.spd;p2.st=“walk”;}
else if(p2.aist===“jump”&&p2.grnd){p2.vy=JF;p2.grnd=false;p2.vx=(p1.x>p2.x?1:-1)*3.5;}
else{p2.vx*=0.55;if(Math.abs(p2.vx)<0.5){p2.vx=0;if(p2.st===“walk”)p2.st=“idle”;}}
return;
}
p2.aidt=Math.floor(rt+Math.random()*14);
var r=Math.random();
if(dist>280)p2.aist=“approach”;
else if(dist<36&&r<0.38)p2.aist=“retreat”;
else if(dist<100&&r<agg){
p2.aist=“attack”;var r2=Math.random();
if(r2<0.1&&p2.sp>=100)p2.aia=“super”;else if(r2<0.24)p2.aia=“combo”;else if(r2<0.42)p2.aia=“special”;else if(r2<0.62)p2.aia=“kick”;else p2.aia=“punch”;
aiAtk(p2.aia);p2.aist=“idle”;
} else p2.aist=r<0.62?“approach”:r<0.78?“jump”:“idle”;
p2.face=p1.x<p2.x?-1:1;
// AI shoots projectiles
if(p2.ed.projType&&dist<280&&dist>80&&Math.random()<0.06+cr2*0.004){aiShoot();}
}

function aiAtk(type){
if(!p2||p2.hs>0)return;
// REAL damage values based on round
var base=6+cr2*.8;
var dmgMap={punch:Math.round(base),kick:Math.round(base*1.4),special:Math.round(base*2.2),combo:Math.round(base*2.8),super:Math.round(base*4)};
var dmg=dmgMap[type]||Math.round(base);
var rng={punch:95,kick:92,special:170,combo:110,super:230}[type]||90;
if(type===“super”){if(p2.sp<100)return;p2.sp=0;p2.st=“super”;p2.stT=40;if(Math.abs(p2.x-p1.x)<rng)doHit(p2,p1,dmg,“super”);}
else if(type===“combo”){p2.st=“punch”;p2.stT=26;if(Math.abs(p2.x-p1.x)<rng)doHit(p2,p1,dmg,“combo”);}
else{p2.st=type;p2.stT=20;if(Math.abs(p2.x-p1.x)<rng)doHit(p2,p1,dmg,type);}
}

function aiShoot(){
if(!p2||!p2.ed.projType)return;
var dir=p2.face,ox=p2.x+(dir>0?28:0),oy=p2.y-34;
var base=5+cr2*.7;
addProj(ox,oy,dir*10+(Math.random()-.5)*2,(Math.random()-.5)*2,Math.round(base*1.8),p2.ed.projCol||”#f00”,10,“p2”,p2.ed.projType||“ball”);
p2.sp=Math.min(100,p2.sp+8);
}

// MAIN LOOP
function loop(){
raf=requestAnimationFrame(loop);
if(gs!==“fight”)return;
if(shk>0){sx2=(Math.random()-.5)*shk;sy2=(Math.random()-.5)*shk;shk-=1.4;}else{sx2=0;sy2=0;}
updCD();stepP1();runAI();stepF(p2);stepParts();stepProjs();draw();
}

function stepP1(){
if(!p1)return;
var ml=kb[“KeyA”]||vk.left,mr=kb[“KeyD”]||vk.right,mu=kb[“KeyW”]||vk.up;
if(p1.hs>0){p1.hs–;p1.st=“hurt”;}
else if(p1.stT<=0&&p1.st!==“super”){
if(mu&&p1.grnd){p1.vy=JF;p1.grnd=false;}
if(ml){p1.vx=-pc.spd;p1.st=“walk”;p1.face=-1;}else if(mr){p1.vx=pc.spd;p1.st=“walk”;p1.face=1;}else{p1.vx*=0.72;p1.st=p1.grnd?“idle”:“jump”;}
}
if(p1.stT>0)p1.stT–;
stepF(p1);
if(p1.hs<=0&&p1.st!==“super”)p1.face=p2.x>p1.x?1:-1;
if(p1.sp<100)p1.sp=Math.min(100,p1.sp+0.055);
}

function stepF(f){
f.x+=f.vx;f.vy+=GRAV;f.y+=f.vy;
if(f.y>=FLOOR){f.y=FLOOR;f.vy=0;f.grnd=true;if(f.st===“jump”)f.st=“idle”;}else f.grnd=false;
f.x=clamp(18,762,f.x);
f.at++;if(f.at>8){f.at=0;f.af=(f.af+1)%4;}
if(f.sp<100)f.sp=Math.min(100,f.sp+0.035);
if(f.stT>0){f.stT–;if(f.stT===0&&f.st!==“idle”&&f.st!==“walk”&&f.st!==“hurt”&&f.st!==“jump”)f.st=“idle”;}
if(f.isAI)f.face=p1.x<f.x?-1:1;
}

// DRAW FRAME
function draw(){
ctx.save();ctx.translate(Math.round(sx2),Math.round(sy2));
var bg=ENMS[cr2]?ENMS[cr2].bg:“sea”;
drawBG(bg);
// Hurt flash
if(p2&&p2.hs>0&&p2.hs%3===0){ctx.fillStyle=“rgba(255,0,0,0.18)”;ctx.fillRect(0,0,GW,GH);}
if(p1&&p1.hs>0&&p1.hs%3===0){ctx.fillStyle=“rgba(255,255,255,0.12)”;ctx.fillRect(0,0,GW,GH);}
drawParts();
drawProjs();
drawFighter(p2,true);
drawFighter(p1,false);
ctx.restore();
}

function drawFighter(f,isEnemy){
if(!f)return;
ctx.save();
var sup=f.st===“super”;
if(f.face===-1){
ctx.translate(f.x+28,0);ctx.scale(-1,1);
if(isEnemy)drawEnemy(ctx,0,f.y-70,-1,f.st,f.af,f.ed,sup);
else pc.draw(ctx,0,f.y-70,-1,f.st,f.af,sup);
} else {
if(isEnemy)drawEnemy(ctx,f.x,f.y-70,1,f.st,f.af,f.ed,sup);
else pc.draw(ctx,f.x,f.y-70,1,f.st,f.af,sup);
}
// HP bar above fighter
var bw=50,bh=6,bx3=f.x+14-bw/2,by3=f.y-82;
ctx.fillStyle=“rgba(0,0,0,0.6)”;ctx.fillRect(bx3-1,by3-1,bw+2,bh+2);
ctx.fillStyle=f.hp/f.mhp>0.5?”#00cc00”:f.hp/f.mhp>0.25?”#ff8800”:”#cc0000”;
ctx.fillRect(bx3,by3,Math.round(bw*f.hp/f.mhp),bh);
ctx.restore();
}

// HUD
function updHUD(){
if(!p1||!p2)return;
var p1p=p1.hp/p1.mhp*100,p2p=p2.hp/p2.mhp*100;
var b1=G(“p1h”),b2=G(“p2h”);
if(b1){b1.style.width=clamp(0,100,p1p)+”%”;b1.className=“hpb”+(p1p<25?” lo”:p1p<50?” mi”:””);}
if(b2){b2.style.width=clamp(0,100,p2p)+”%”;b2.className=“hpb”+(p2p<25?” lo”:p2p<50?” mi”:””);}
if(G(“p1s”))G(“p1s”).style.width=clamp(0,100,p1.sp)+”%”;
if(G(“p2s”))G(“p2s”).style.width=clamp(0,100,p2.sp)+”%”;
}

var htTO=null;
function showHT(txt,x,y,col){
var el=G(“htxt”);if(!el)return;
if(htTO)clearTimeout(htTO);
el.style.left=clamp(5,GW-80,x)*csc+“px”;
el.style.top=clamp(5,GH-30,y)*csc+“px”;
el.style.color=col||”#fff”;el.style.fontSize=Math.round(clamp(7,12,2.6)*csc)+“px”;
el.textContent=txt;el.style.opacity=“1”;
htTO=setTimeout(function(){el.style.opacity=“0”;},650);
}
function showCombo(txt){var el=G(“ctxt”);if(!el)return;el.textContent=txt;el.style.opacity=“1”;setTimeout(function(){el.style.opacity=“0”;},900);}
function showMsg(txt,dur,cb){var el=G(“mtxt”);if(!el)return;el.textContent=txt;el.classList.add(“show”);setTimeout(function(){el.classList.remove(“show”);if(cb)setTimeout(cb,300);},dur||1400);}

// BATTLE
function startBattle(){
CD={punch:0,kick:0,special:0,combo:0,q:0,w:0};updCD();PARTS=[];PROJS=[];
var ed=ENMS[cr2];if(!ed)return;
var bh=Math.round(ed.hp*(1+cr2*0.04));
p2=mkP2(ed,620);p2.hp=bh;p2.mhp=bh;
p1=mkP1(pc,120);
G(“p1n”).textContent=pc.name;G(“p2n”).textContent=ed.name;
G(“rnd”).textContent=“RD “+(cr2+1)+”/30”;
tv=60;G(“tmr”).textContent=tv;
if(ti)clearInterval(ti);
ti=setInterval(function(){if(gs!==“fight”)return;tv–;G(“tmr”).textContent=tv;if(tv<=0)endBattle(“time”);},1000);
// Update Q/W button labels
if(G(“qlb”))G(“qlb”).textContent=pc.abilities.q.name.slice(0,5);
if(G(“wlb”))G(“wlb”).textContent=pc.abilities.w.name.slice(0,5);
updHUD();gs=“fight”;if(!raf)loop();
showMsg(“FIGHT!”,900);
}

function endBattle(result){
gs=“end”;if(ti)clearInterval(ti);ti=null;
if(result===“player”){
if(cr2>=29){showMsg(“PIRATE KING!”,2400,function(){showGO(true);});}
else{showMsg(“VICTORY!”,1200,function(){cr2++;showStory();});}
} else {showMsg(“KO!”,1400,function(){showGO(false);});}
}

function showGO(win){
var ed=ENMS[clamp(0,29,cr2)];
G(“sarc”).textContent=win?“CONGRATULATIONS!”:“GAME OVER”;
G(“srnd”).textContent=“ROUND “+(cr2+1)+” / 30”;
G(“semo”).innerHTML=win?”🎉”:”💀”;
G(“sname”).textContent=win?“YOU ARE PIRATE KING!”:“DEFEATED!”;
G(“sdesc”).textContent=win?“You conquered all 30 rounds and became King of Pirates!”:“Train harder and challenge again!”;
G(“sfbtn”).textContent=win?“PLAY AGAIN”:“TRY AGAIN”;
G(“sfbtn”).onclick=function(){cr2=win?0:cr2;gs=“title”;PARTS=[];PROJS=[];show(“st”);};
show(“si”);
}

// SCREENS
function showCharSel(){
var grid=G(“cgrid”);if(!grid)return;
grid.innerHTML=””;
CHARS.forEach(function(ch){
var card=document.createElement(“div”);card.className=“ccard”;
var cv=document.createElement(“canvas”);cv.width=62;cv.height=82;
var c2=cv.getContext(“2d”);ch.draw(c2,7,74,1,“idle”,0,false);
card.appendChild(cv);
var dn=document.createElement(“div”);dn.className=“cn”;dn.textContent=ch.name;card.appendChild(dn);
var da=document.createElement(“div”);da.className=“ca”;da.textContent=ch.sub;card.appendChild(da);
card.addEventListener(“click”,function(){
document.querySelectorAll(”.ccard”).forEach(function(c3){c3.classList.remove(“sel”);});
card.classList.add(“sel”);pc=ch;
G(“csbtn”).textContent=“FIGHT AS “+ch.name;G(“csbtn”).className=“sbtn rdy”;
});
grid.appendChild(card);
});
cr2=0;show(“sc”);
}

G(“csbtn”).addEventListener(“click”,function(){if(pc)show(“sh”);});
G(“hL”).addEventListener(“click”,function(){setHand(“left”);});
G(“hR”).addEventListener(“click”,function(){setHand(“right”);});
G(“hL”).addEventListener(“touchstart”,function(e){e.preventDefault();setHand(“left”);},{passive:false});
G(“hR”).addEventListener(“touchstart”,function(e){e.preventDefault();setHand(“right”);},{passive:false});

function setHand(h){
hand2=h;document.querySelectorAll(”.hbtn”).forEach(function(b){b.classList.remove(“sel”);});
G(h===“left”?“hL”:“hR”).classList.add(“sel”);
var tc=G(“tc”),ls=G(“lside”),rs=G(“rside”);
if(h===“left”&&ls&&rs){tc.insertBefore(rs,ls);}else if(ls&&rs){tc.insertBefore(ls,rs);}
showStory();
}

function showStory(){
var ed=ENMS[cr2];if(!ed)return;
G(“sarc”).textContent=ed.arc;G(“srnd”).textContent=“ROUND “+(cr2+1)+” OF 30”;
G(“semo”).innerHTML=ed.em;G(“sname”).textContent=ed.name+(ed.boss?” - BOSS”:””);
G(“sdesc”).textContent=ed.desc;G(“sfbtn”).textContent=“FIGHT!”;
G(“sfbtn”).onclick=function(){show(“sg”);resizeCanvas();setTimeout(startBattle,80);};
show(“si”);
}

G(“st”).addEventListener(“click”,showCharSel);
G(“st”).addEventListener(“touchstart”,function(e){e.preventDefault();showCharSel();},{passive:false});

resizeCanvas();

})();
</script>

</body>
